<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Medium</div>

        <nav>
            <a href="#">Our story</a>
            <a href="#">Membership</a>
            <a href="#">Write</a>
            <a href="#">Sign in</a>
            <button>Get started</button>
        </nav>
    </header>

    <section class="hero">

        <div class="hero-content">
            <h1>Human<br>stories & ideas</h1>

            <p>
                A place to read, write, and deepen your understanding
            </p>

            <button class="read-btn">Start reading</button>
        </div>

        <div class="hero-image">
            <img src="image.webp" alt="Hero Image">
        </div>

    </section>

    <footer>
        <a href="#">Help</a>
        <a href="#">Status</a>
        <a href="#">About</a>
        <a href="#">Careers</a>
        <a href="#">Press</a>
        <a href="#">Blog</a>
        <a href="#">Store</a>
        <a href="#">Privacy</a>
        <a href="#">Rules</a>
        <a href="#">Terms</a>
    </footer>

</body>
</html>
